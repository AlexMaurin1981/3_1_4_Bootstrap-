<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">
</head>
<body>
    <div class="modal-header bg-light">
    <h5>Edit user</h5>
    </div>
    <div class="modal-body text-center fw-bold w-25">
        <form th:method="PATCH" th:action="@{/admin/update/{id}(id=${user.getId()})}" th:object="${user}">
                    <div class="form-group">
                        <label for="id">ID</label>
                        <br>
                        <input type="text" class="form-control" id="id" th:field="*{id}" readonly required>
                    </div>

                    <div class="form-group">
                        <label for="name">First name</label>
                        <br>
                        <input type="text" class="form-control" id="name" th:field="*{firstName}" required>
                    </div>
                    <div class="form-group">
                        <label for="surname">Last name</label>
                        <br>
                        <input type="text" class="form-control" id="surname" th:field="*{lastName}" required>
                    </div>
                    <div class="form-group">
                        <label for="age">Age</label>
                        <br>
                        <input type="number" class="form-control" id="age" th:field="*{age}" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <br>
                        <input type="email" class="form-control" id="email" th:field="*{email}" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <br>
                        <input type="password" class="form-control" id="password" th:field="*{password}">
                    </div>
                    <div class="form-group">
                        <label for="role">Role</label>
                        <br>
                        <select class="form-select form-select-sm"  id="role"  size=2 th:field="*{roles}" multiple>
                            <option th:each="role : ${roles}"
                              th:value="${role.getId()}"
                              th:text="${role.toString()}">
                            </option>
                        </select>
                        <br>
                    </div>
            <div class="modal-footer">
                    <form th:method="POST" th:action="@{/logout}">
                        <button type="button"  class="btn btn-secondary">Close</button>
                        <button type="button" class="btn btn-primary">Edit</button>
                    </form>
            </div>
        </form>
    </div>
</body>
</html>
