<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">
    <title>Add User</title>

</head>
<body>
<div class="card ">
    <div class="card-header bg-light">
        <h5>Add new user</h5>
        <button type="button"
                class="btn-close"
                data-bs-dismiss="modal">
        </button>
    </div>
    <div class="card-body text-center fw-bold">

                <form th:action="@{saveUser}" th:object="${user}" th:method="post">
                    <div class="form-group">
                        <label for="name">First Name:</label>
                        <br>
                        <input type="text" class="form-control"id="name" th:field="*{firstName}" placeholder="First Name" required>
                    </div>
                    <div class="form-group">
                        <label for="surname">Last Name:</label>
                        <br>
                        <input type="text" class="form-control" id="surname"   th:field="*{lastName}"  placeholder="Last Name" required>
                    </div>
                    <div class="form-group">
                        <label for ="age">Age:</label>
                        <br>
                        <input type="number" class="form-control"  id="age" th:field="*{age}" placeholder="Age:" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <br>
                        <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="Email:" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password:</label>
                        <br>
                        <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="Password:" required>
                    </div>
                    <div class="form-group">
                        <label for="role">Role:</label>
                        <br>
                        <select class="form-select form-select-sm " size="2" id="role" th:field="*{roles}" multiple>
                            <option th:each="role : ${roles}"
                                    th:value="${role.getId()}"
                                    th:text="${role.toString()}"></option>
                        </select>
                    </div>
                    <button class="btn btn-success btr-lg " type="submit">Add new user</button>
                </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
</body>
</html>
